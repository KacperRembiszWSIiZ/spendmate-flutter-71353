name: spend_mate
description: "SpendMate - lokalna aplikacja do rejestrowania i analizowania wydatków."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.12.2 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  provider: 6.1.5
  sqflite: 2.4.2
  path: 1.9.1
  path_provider: 2.1.5
  image_picker: 1.1.2
  fl_chart: 1.0.0
  intl: 0.20.2
  uuid: 4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: 6.0.0

flutter:
  uses-material-design: true
